<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Expense & Budget Visualizer</h1>
            <button id="themeToggle" class="btn-toggle">🌓 Toggle Mode</button>
        </header>

        <div class="balance-card">
            <h2>TOTAL BALANCE</h2>
            <div id="totalBalance" class="balance-amount">$0.00</div>
        </div>

        <div class="main-layout">
            <div class="card form-card">
                <h3>Add Transaction</h3>
                <form id="expenseForm">
                    <div class="form-group">
                        <label for="itemName">Item Name</label>
                        <input type="text" id="itemName" placeholder="e.g., Cilok" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="amount">Amount ($)</label>
                        <input type="number" id="amount" step="0.01" placeholder="14.94" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="" disabled selected>Select a category</option>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Fun">Fun</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="budgetLimit">Highlight Limit Warning ($) - Optional</label>
                        <input type="number" id="budgetLimit" step="0.01" placeholder="Highlight items over this amount">
                    </div>

                    <button type="submit" class="btn-submit">Add Transaction</button>
                </form>
            </div>

            <div class="card chart-card">
                <h3>Spending by Category</h3>
                <div class="chart-container">
                    <canvas id="spendingChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card history-card">
            <div class="history-header">
                <h3>Transactions</h3>
                <div class="sort-controls">
                    <label for="sortBy">Sort By: </label>
                    <select id="sortBy">
                        <option value="date-desc">Newest First</option>
                        <option value="date-asc">Oldest First</option>
                        <option value="amount-desc">Highest Amount</option>
                        <option value="amount-asc">Lowest Amount</option>
                    </select>
                </div>
            </div>
            <ul id="transactionList" class="transaction-list">
                </ul>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
